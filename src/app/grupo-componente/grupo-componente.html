<div class="container">

  <form>

    <div class="mb-3">
      <label class="form-label">Nombre de la Categoria: </label>
      <input [(ngModel)]="nuevaCategoria.tipo"
             name="tipo"
             type="text"
             class="form-control">
      <div class="form-text">Este parametro es obligatorio</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Descripcion del producto: </label>
      <textarea [(ngModel)]="nuevaCategoria.descripcion"
                name="descripcion"
                class="form-control"
                rows="3"></textarea>
    </div>

    <button (click)="guardar()"
            type="button"
            class="btn btn-primary mb-3">
      Guardar
    </button>

  </form>

</div>
